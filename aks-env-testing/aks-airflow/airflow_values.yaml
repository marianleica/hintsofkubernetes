images:
  airflow:
    repository: mydnsrandomnamebdgfj.azurecr.io/airflow
    tag: 2.9.3
    # tag: 3.1.0
    # Specifying digest takes precedence over tag.
    digest: ~
    pullPolicy: IfNotPresent
  # To avoid images with user code, you can turn this to 'true' and
  # all the 'run-airflow-migrations' and 'wait-for-airflow-migrations' containers/jobs
  # will use the images from 'defaultAirflowRepository:defaultAirflowTag' values
  # to run and wait for DB migrations .
  useDefaultImageForMigration: false
  # timeout (in seconds) for airflow-migrations to complete
  migrationsWaitTimeout: 60
  pod_template:
    # Note that  and  parameters
    # can be overridden in  section. So for these parameters to have effect
    #  and 
    # must be not set .
    repository: mydnsrandomnamebdgfj.azurecr.io/airflow
    tag: 2.9.3
    # tag: 3.1.0
    pullPolicy: IfNotPresent
  flower:
    repository: mydnsrandomnamebdgfj.azurecr.io/airflow
    tag: 2.9.3
    # tag: 3.1.0
    pullPolicy: IfNotPresent
  statsd:
    repository: mydnsrandomnamebdgfj.azurecr.io/statsd-exporter
    tag: v0.26.1 
    pullPolicy: IfNotPresent
  pgbouncer:
    repository: mydnsrandomnamebdgfj.azurecr.io/airflow
    tag: airflow-pgbouncer-2024.01.19-1.21.0
    # tag: airflow-pgbouncer-2025.03.05-1.23.1
    pullPolicy: IfNotPresent
  pgbouncerExporter:
    repository: mydnsrandomnamebdgfj.azurecr.io/airflow
    tag: airflow-pgbouncer-exporter-2024.06.18-0.17.0
    # tag: airflow-pgbouncer-exporter-2025.03.05-0.18.0
    pullPolicy: IfNotPresent
  gitSync:
    repository: mydnsrandomnamebdgfj.azurecr.io/git-sync
    tag: v4.1.0
    pullPolicy: IfNotPresent

# Airflow executor
executor: "KubernetesExecutor"

# Environment variables for all airflow containers
env:
  - name: ENVIRONMENT
    value: dev

extraEnv: |
  - name: AIRFLOW__CORE__DEFAULT_TIMEZONE
    value: 'America/New_York'

# Configuration for postgresql subchart
# Not recommended for production! Instead, spin up your own Postgresql server and use the  attribute in this
# yaml file.
postgresql:
  enabled: true
  image:
    repository: bitnamisecure/postgresql
    tag: latest
    pullPolicy: IfNotPresent

# Enable pgbouncer. See https://airflow.apache.org/docs/helm-chart/stable/production-guide.html#pgbouncer
pgbouncer:
  enabled: true

dags:
  gitSync:
    enabled: true
    repo: https://github.com/donhighmsft/airflowexamples.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 0
    subPath: "dags"
    # sshKeySecret: airflow-git-ssh-secret
    # knownHosts: |
    #   github.com ssh-rsa 

logs:
  persistence:
    enabled: true
    existingClaim: pvc-airflow-logs
    storageClassName: azureblob-fuse-premium

# We disable the log groomer sidecar because we use Azure Blob Storage for logs, with lifecyle policy set.
triggerer:
  logGroomerSidecar:
    enabled: false

scheduler:
  logGroomerSidecar:
    enabled: false

workers:
  logGroomerSidecar:
    enabled: false